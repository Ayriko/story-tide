# Stack PRODUCTION — projet Compose isole (`-p storytide-prod`), routee par la
# stack Traefik partagee (deploy/traefik/) via le reseau externe `web`. Voir
# ADR-0013 : ce fichier est auto-contenu et QUASI IDENTIQUE a
# compose.staging.yml (seuls domaine/BETTER_AUTH_URL/nom de projet/presence du
# service `backup` changent) — toute evolution doit etre repercutee dans les
# DEUX fichiers.
#
# Usage (CD, voir .github/workflows/cd.yml) :
#   IMAGE_TAG=<tag> docker compose -p storytide-prod --env-file .env.prod \
#     -f deploy/compose.prod.yml pull
#   IMAGE_TAG=<tag> docker compose -p storytide-prod --env-file .env.prod \
#     -f deploy/compose.prod.yml up -d --remove-orphans
#
# IMAGE_TAG est injecte par le workflow CD (jamais present dans .env.prod).

services:
  # One-shot : applique les migrations Prisma avant que app/worker ne demarrent.
  # `restart: "no"` — un job de migration ne doit jamais boucler en redemarrage.
  migrate:
    image: ghcr.io/ayriko/story-tide-migrate:${IMAGE_TAG}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
    networks:
      - internal
    # Rotation des logs (supervision v1) : un disque plein par les logs est la
    # panne la plus frequente sur un VPS, non detectable par la sonde externe
    # avant qu'il soit trop tard.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: ghcr.io/ayriko/story-tide-app:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      S3_ENDPOINT: minio
      S3_PORT: 9000
      S3_USE_SSL: "false"
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    # Pas de `ports:` — seul Traefik (reseau `web`) expose l'app a l'exterieur
    # (garde-fou ufw/Docker : Docker contourne ufw pour tout port publie).
    networks:
      - internal
      - web
    healthcheck:
      # node:slim n'a ni curl ni wget : sonde HTTP inline via fetch (Node 24).
      # /api/health verifie aussi la base (supervision v1, C4.1.2) - statut
      # 200 uniquement = app ET base vivantes, `--wait` du CD echoue sinon.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/health').then((r) => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    labels:
      traefik.enable: "true"
      traefik.docker.network: web
      traefik.http.routers.app-prod.rule: "Host(`storytide.fr`)"
      traefik.http.routers.app-prod.entrypoints: websecure
      traefik.http.routers.app-prod.tls.certresolver: le
      traefik.http.routers.app-prod.middlewares: "secure-headers@file"
      traefik.http.routers.app-prod-www.rule: "Host(`www.storytide.fr`)"
      traefik.http.routers.app-prod-www.entrypoints: websecure
      traefik.http.routers.app-prod-www.tls.certresolver: le
      traefik.http.routers.app-prod-www.middlewares: "www-to-apex@file"
      traefik.http.services.app-prod.loadbalancer.server.port: "3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ghcr.io/ayriko/story-tide-worker:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      S3_ENDPOINT: minio
      S3_PORT: 9000
      S3_USE_SSL: "false"
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    # Pas de `ports:`, pas de reseau `web` — le worker n'est jamais routable
    # depuis l'exterieur (aucun labels Traefik).
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Boucle locale UNIQUEMENT (supervision v1 / acces donnees) : injoignable
    # depuis l'exterieur (pas de port publie sur l'interface publique), sert
    # a la consultation des donnees de production via tunnel SSH chiffre +
    # Prisma Studio - aucune console d'administration exposee. PROD
    # uniquement (pas en staging, cf. compose.staging.yml).
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # Pas de `ports:` — console et API MinIO non exposees publiquement (le
    # service public d'images est hors perimetre KAN-10, cf. KAN-16).
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Sauvegardes quotidiennes : pg_dump + miroir du bucket MinIO, retention 7 j.
  # Voir deploy/backup/. Prod uniquement dans ce fichier (staging = optionnel,
  # donnees de test).
  backup:
    image: ghcr.io/ayriko/story-tide-backup:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      BACKUP_RETENTION_DAYS: "7"
      # Heartbeat (supervision v1) : ping apres succes complet de la sauvegarde.
      # Optionnel - absent ou vide = aucun ping (voir deploy/backup/backup.sh).
      BACKUP_HEARTBEAT_URL: ${BACKUP_HEARTBEAT_URL:-}
    volumes:
      - backups:/backups
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
  web:
    external: true

volumes:
  pgdata:
  minio:
  backups:
