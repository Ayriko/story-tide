# Stack STAGING — projet Compose isole (`-p storytide-staging`), routee par la
# stack Traefik partagee (deploy/traefik/) via le reseau externe `web`. Voir
# ADR-0013 : ce fichier est QUASI IDENTIQUE a compose.prod.yml (seuls le
# domaine/BETTER_AUTH_URL/nom de router/absence de routeur www changent) —
# toute evolution doit etre repercutee dans les DEUX fichiers.
#
# Usage (CD, voir .github/workflows/cd.yml) :
#   IMAGE_TAG=<tag> docker compose -p storytide-staging --env-file .env.staging \
#     -f deploy/compose.staging.yml pull
#   IMAGE_TAG=<tag> docker compose -p storytide-staging --env-file .env.staging \
#     -f deploy/compose.staging.yml up -d --remove-orphans
#
# IMAGE_TAG est injecte par le workflow CD (jamais present dans .env.staging).
# Donnees de test uniquement — jamais les donnees de prod (volumes isoles par
# projet Compose).

services:
  migrate:
    image: ghcr.io/ayriko/story-tide-migrate:${IMAGE_TAG}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
    networks:
      - internal
    # Rotation des logs (supervision v1) : un disque plein par les logs est la
    # panne la plus frequente sur un VPS, non detectable par la sonde externe
    # avant qu'il soit trop tard.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    image: ghcr.io/ayriko/story-tide-app:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      S3_ENDPOINT: minio
      S3_PORT: 9000
      S3_USE_SSL: "false"
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    # Pas de `ports:` — seul Traefik (reseau `web`) expose l'app a l'exterieur.
    networks:
      - internal
      - web
    healthcheck:
      # /api/health verifie aussi la base (supervision v1, C4.1.2) - statut
      # 200 uniquement = app ET base vivantes, `--wait` du CD echoue sinon.
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/api/health').then((r) => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    labels:
      traefik.enable: "true"
      traefik.docker.network: web
      traefik.http.routers.app-staging.rule: "Host(`staging.storytide.fr`)"
      traefik.http.routers.app-staging.entrypoints: websecure
      traefik.http.routers.app-staging.tls.certresolver: le
      traefik.http.routers.app-staging.middlewares: "secure-headers@file"
      traefik.http.services.app-staging.loadbalancer.server.port: "3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ghcr.io/ayriko/story-tide-worker:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      S3_ENDPOINT: minio
      S3_PORT: 9000
      S3_USE_SSL: "false"
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Pas de `ports:` — jamais joignable depuis Internet, reseau interne
    # uniquement. Contrairement a compose.prod.yml : pas d'acces loopback ici
    # (donnees de test, sans valeur a consulter via tunnel SSH).
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot (BUG-011/BUG-010, 2026-07-23) : provisionne le bucket MinIO avant
  # que app/worker/backup ne demarrent - un bucket manquant fait echouer TOUT
  # upload d'image avec un message generique cote client ("Envoi impossible
  # pour le moment."), cause reelle uniquement visible dans les logs serveur
  # (NoSuchBucket). `--ignore-existing` : idempotent, ne re-echoue pas sur un
  # bucket deja cree par un run precedent. `mc anonymous set none` : prive par
  # defaut, meme mesure que docker-compose.dev.yml (OWASP A10).
  minio-setup:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set staging http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing staging/${S3_BUCKET} &&
      mc anonymous set none staging/${S3_BUCKET}
      "
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optionnel en staging (donnees de test, valeur de sauvegarde faible) —
  # laisse actif par defaut pour rester au plus pres de compose.prod.yml
  # (ADR-0013). Desactiver : `docker compose -p storytide-staging ... rm -sf backup`.
  backup:
    image: ghcr.io/ayriko/story-tide-backup:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      BACKUP_RETENTION_DAYS: "7"
      # Heartbeat (supervision v1) : ping apres succes complet de la sauvegarde.
      # Optionnel - absent ou vide = aucun ping (voir deploy/backup/backup.sh).
      BACKUP_HEARTBEAT_URL: ${BACKUP_HEARTBEAT_URL:-}
    volumes:
      - backups:/backups
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
  web:
    external: true

volumes:
  pgdata:
  minio:
  backups:
