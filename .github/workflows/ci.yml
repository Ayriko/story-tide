name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  # Placeholders Zod-valides (src/env.ts), pas des secrets : rien ne se
  # connecte reellement a Postgres/MinIO au build ni aux tests unitaires
  # (fakes memoire). Ces valeurs documentent aussi l'env attendu. Au niveau
  # workflow (et non duplique par job) : une seule source pour les 3 jobs.
  # S3_ACCESS_KEY >= 3 caracteres : seul le job e2e demarre un vrai MinIO
  # (KAN-16), qui refuse de booter sous ce seuil ("ci" ne suffisait pas).
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/story_tide?schema=public"
  BETTER_AUTH_SECRET: "ci-placeholder-secret-at-least-32-characters"
  BETTER_AUTH_URL: "http://localhost:3000"
  S3_ENDPOINT: "localhost"
  S3_PORT: "9000"
  S3_USE_SSL: "false"
  S3_REGION: "us-east-1"
  S3_ACCESS_KEY: "ci-access-key"
  S3_SECRET_KEY: "ci-secret-placeholder"
  S3_BUCKET: "story-tide-ci"

jobs:
  # Garde statique rapide. Independant du job test : un echec ici ne doit
  # jamais empecher la couverture de se calculer et d'etre publiee (incident
  # du 2026-07-15 : format:check en echec => job unique interrompu avant
  # test:coverage => coverage/ absent => les etapes if:always() du rapport de
  # couverture plantaient en ENOENT).
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # node 24 (Active LTS) : aligne sur le dev local et l'image Docker,
          # satisfait l'engine pg-boss (>=22.12).
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint

      - run: npm run typecheck

  # Isole de quality : tourne meme si format/lint/typecheck echouent, pour que
  # la couverture (C2.1.1/C2.2.2, seuil bloquant) reste toujours produite et
  # visible en artefact + commentaire de PR.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run test:coverage

      - name: Publier le rapport de couverture en artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Commenter la couverture sur la PR
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run build

  # Isole des 3 jobs ci-dessus (meme principe) : le smoke Playwright ne doit
  # bloquer ni etre bloque par quality/test/build. Seul job a se connecter a
  # une VRAIE base (garde-fous de e2e/global-setup.ts : hote localhost, nom de
  # base finissant par "_e2e" - jamais la base "story_tide" du reste de la
  # CI). DATABASE_URL est le seul override necessaire au niveau job ; les
  # autres placeholders (BETTER_AUTH_*, S3_*) restent ceux du workflow.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: story_tide_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/story_tide_e2e?schema=public"
      # playwright.config.ts lance `next dev` sur le port 3100 (PORT), pas le
      # 3000 du placeholder workflow (jamais reellement utilise par
      # quality/test/build). .env.e2e est gitignore (absent en CI) : sans cet
      # override, uploadImage() persiste des src pointant vers :3000, ou rien
      # n'ecoute - l'image ne charge jamais (KAN-16, image-upload.spec.ts).
      BETTER_AUTH_URL: "http://localhost:3100"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # KAN-16 : e2e/image-upload.spec.ts fait un vrai aller-retour MinIO.
      # Pas de bloc `services:` ici : minio/minio exige sa commande
      # (`server /data`) au demarrage, or GitHub Actions ne permet pas de
      # fournir des arguments de commande a un service (seulement des
      # options docker). Demarrage manuel + attente de sante + creation du
      # bucket via mc, meme logique que le minio-setup de docker-compose.dev.yml.
      # Identifiants derives de S3_ACCESS_KEY/S3_SECRET_KEY/S3_PORT/S3_BUCKET
      # (env du workflow) - source unique, ne peut pas diverger.
      - name: Démarrer MinIO
        run: |
          docker run -d --name minio-e2e -p "${S3_PORT}:9000" \
            -e MINIO_ROOT_USER="$S3_ACCESS_KEY" \
            -e MINIO_ROOT_PASSWORD="$S3_SECRET_KEY" \
            minio/minio server /data
          timeout 60 sh -c 'until curl -sf "http://localhost:${S3_PORT}/minio/health/live"; do sleep 1; done' \
            || { echo "MinIO n'a pas démarré :"; docker logs minio-e2e; exit 1; }

      - name: Créer le bucket MinIO
        run: |
          docker run --rm --network host \
            -e MC_HOST_local="http://$S3_ACCESS_KEY:$S3_SECRET_KEY@localhost:$S3_PORT" \
            minio/mc mb --ignore-existing "local/$S3_BUCKET"

      - run: npm run test:e2e

      - name: Publier les traces Playwright en cas d'echec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
